<title>Venezia · Guide Mai 2026</title>

<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>

<!-- Leaflet -->

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<style>
/* ── Reset & base ───────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --terra:   #6b2d0e;
  --terra2:  #8c3d18;
  --gold:    #c9973a;
  --gold-lt: #e4b86a;
  --cream:   #fdf5e6;
  --ink:     #1c1108;
  --muted:   #7a6550;
  --p0: #c0392b;
  --p1: #d35400;
  --p2: #b7860b;
  --p3: #27ae60;
  --sp: #6c3483;
  --air: #1a5276;
  --special: #1abc9c;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}

html, body {
  height: 100%;
  width: 100%;
  overflow: hidden;
  background: var(--ink);
  font-family: 'DM Sans', sans-serif;
  -webkit-font-smoothing: antialiased;
  touch-action: manipulation;
}

/* ── Layout ─────────────────────────────────── */
#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bot);
}

/* ── Header ─────────────────────────────────── */
#header {
  flex-shrink: 0;
  background: var(--terra);
  padding: 10px 16px 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1.5px solid var(--gold);
  position: relative;
  z-index: 1000;
}

#header h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--cream);
  line-height: 1;
  letter-spacing: 0.04em;
}
#header h1 span {
  font-style: italic;
  font-weight: 400;
  color: var(--gold-lt);
  font-size: 14px;
}
#header .sub {
  font-size: 10px;
  color: #c9a97a;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-top: 2px;
}

/* GPS button */
#btn-gps {
  background: rgba(255,255,255,0.12);
  border: 1.5px solid var(--gold);
  border-radius: 10px;
  padding: 7px 13px;
  color: var(--cream);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.04em;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: background .2s;
  -webkit-tap-highlight-color: transparent;
}
#btn-gps:active { background: rgba(255,255,255,0.22); }
#btn-gps.active { background: var(--gold); color: var(--terra); border-color: var(--gold-lt); }

.gps-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: currentColor;
  flex-shrink: 0;
}
#btn-gps.active .gps-dot {
  animation: pulse 1.4s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.5; transform: scale(0.7); }
}

/* ── Map ────────────────────────────────────── */
#map {
  flex: 1;
  width: 100%;
  position: relative;
  z-index: 1;
}

/* ── Bottom panel ───────────────────────────── */
#panel {
  flex-shrink: 0;
  background: var(--cream);
  border-top: 2px solid var(--gold);
  max-height: 42vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  transform: translateY(100%);
  transition: transform .35s cubic-bezier(.4,0,.2,1);
  position: relative;
  z-index: 500;
}
#panel.open { transform: translateY(0); }

#panel-handle {
  position: absolute;
  top: 7px;
  left: 50%;
  transform: translateX(-50%);
  width: 36px; height: 4px;
  border-radius: 2px;
  background: #ccc;
}

#panel-content {
  padding: 22px 16px 16px;
}

#panel-close {
  position: absolute;
  top: 8px; right: 12px;
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; color: var(--muted);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.poi-badge {
  display: inline-block;
  padding: 2px 9px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: white;
  margin-bottom: 6px;
}

#panel-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.2;
  margin-bottom: 5px;
}

#panel-desc {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.5;
  margin-bottom: 10px;
}

#panel-tip {
  background: #f5ede0;
  border-left: 3px solid var(--gold);
  padding: 7px 10px;
  border-radius: 0 6px 6px 0;
  font-size: 11.5px;
  color: var(--terra);
  font-style: italic;
  line-height: 1.5;
}

/* ── Legend bottom bar ──────────────────────── */
#legend-bar {
  flex-shrink: 0;
  background: var(--ink);
  border-top: 1px solid #333;
  padding: 6px 10px;
  display: flex;
  align-items: center;
  justify-content: space-around;
  gap: 4px;
}

.leg-item {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 9px;
  color: #aaa;
  letter-spacing: 0.05em;
  white-space: nowrap;
}

.leg-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
  border: 1px solid rgba(255,255,255,0.2);
}

/* ── GPS accuracy circle override ──────────── */
.leaflet-accuracy-circle {
  stroke: #3b82f6 !important;
  fill: #3b82f6 !important;
}

/* ── Toast notification ─────────────────────── */
#toast {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(28,17,8,0.88);
  color: var(--cream);
  padding: 9px 18px;
  border-radius: 20px;
  font-size: 12px;
  border: 1px solid var(--gold);
  opacity: 0;
  transition: opacity .3s, transform .3s;
  pointer-events: none;
  z-index: 2000;
  white-space: nowrap;
  backdrop-filter: blur(8px);
}
#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Leaflet overrides */
.leaflet-control-attribution { font-size: 8px !important; }
.leaflet-popup-content-wrapper {
  border-radius: 10px !important;
  box-shadow: 0 4px 20px rgba(0,0,0,0.25) !important;
}
.leaflet-popup-content { margin: 12px 14px !important; }
</style>
</head>

</div>

<div id="toast"></div>

// ─── Marker SVG factory ──────────────────────────────────────
function svgIcon(color, label, size = 30) {
  const fs = label.length > 2 ? 7 : (label.length > 1 ? 8 : 10);
  const html = `<svg width="${size}" height="${Math.round(size*1.35)}" viewBox="0 0 30 40" xmlns="http://www.w3.org/2000/svg">
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.35"/></filter>
    <path d="M15 0C6.7 0 0 6.7 0 15c0 10.5 15 25 15 25S30 25.5 30 15C30 6.7 23.3 0 15 0z"
          fill="${color}" stroke="rgba(0,0,0,0.28)" stroke-width="1.2" filter="url(#sh)"/>
    <circle cx="15" cy="15" r="8" fill="rgba(255,255,255,0.22)"/>
    <text x="15" y="19.5" text-anchor="middle" dominant-baseline="auto"
          font-family="'DM Sans',Arial,sans-serif" font-size="${fs}" font-weight="800" fill="white"
          style="text-shadow:0 0 3px rgba(0,0,0,0.5)">${label}</text>
  </svg>`;
  return L.divIcon({
    html, className: '',
    iconSize: [size, Math.round(size*1.35)],
    iconAnchor: [size/2, Math.round(size*1.35)],
    popupAnchor: [0, -Math.round(size*1.35)]
  });
}

function starIcon(color) {
  const html = `<svg width="30" height="30" viewBox="0 0 30 30" xmlns="http://www.w3.org/2000/svg">
    <filter id="sh2"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.4"/></filter>
    <polygon points="15,2 19,11 29,11 21,17 24,27 15,21 6,27 9,17 1,11 11,11"
             fill="${color}" stroke="rgba(0,0,0,0.3)" stroke-width="1" filter="url(#sh2)"/>
    <text x="15" y="19" text-anchor="middle" font-family="Arial" font-size="9"
          font-weight="900" fill="white">★</text>
  </svg>`;
  return L.divIcon({ html, className: '', iconSize:[30,30], iconAnchor:[15,15], popupAnchor:[0,-15] });
}

// ─── Couleurs ────────────────────────────────────────────────

  return L.divIcon({ html, className: '', iconSize:[28,28], iconAnchor:[14,14], popupAnchor:[0,-14] });

// ─── Panel ───────────────────────────────────────────────────
function openPanel(poi, color, isStar = false) {
  const prio = poi.prio;
  document.getElementById('panel-badge').textContent = PRIORITY_LABELS[prio] || prio.toUpperCase();
  document.getElementById('panel-badge').style.background = color;
  document.getElementById('panel-title').textContent = poi.name;
  document.getElementById('panel-desc').textContent = poi.desc;
  document.getElementById('panel-tip').textContent = '💡 ' + poi.tip;
  document.getElementById('panel').classList.add('open');
  map.panTo([poi.lat, poi.lng], { animate: true, duration: 0.4 });
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
}

// Fermer en cliquant sur la carte
map.on('click', () => closePanel());

// ─── GPS / Géolocalisation ───────────────────────────────────
let watchId = null;
let gpsActive = false;
let gpsMarker = null;
let gpsCircle = null;
let gpsFollowing = false;

function toggleGPS() {
  if (!gpsActive) { startGPS(); } else { stopGPS(); }
}

function startGPS() {
  if (!navigator.geolocation) {
    showToast('Géolocalisation non disponible sur cet appareil');
    return;
  }
  gpsActive = true;
  gpsFollowing = true;
  document.getElementById('btn-gps').classList.add('active');
  document.getElementById('gps-label').textContent = 'Suivi ON';
  showToast('Recherche de votre position…');

  watchId = navigator.geolocation.watchPosition(
    pos => onGPSSuccess(pos),
    err => onGPSError(err),
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 3000 }
  );
}

function stopGPS() {
  if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
  gpsActive = false;
  gpsFollowing = false;
  document.getElementById('btn-gps').classList.remove('active');
  document.getElementById('gps-label').textContent = 'GPS';
  if (gpsMarker) { map.removeLayer(gpsMarker); gpsMarker = null; }
  if (gpsCircle) { map.removeLayer(gpsCircle); gpsCircle = null; }
  showToast('GPS désactivé');
}

function onGPSSuccess(pos) {
  const { latitude: lat, longitude: lng, accuracy } = pos.coords;

  // Marqueur position
  const gpsSvg = `<svg width="22" height="22" viewBox="0 0 22 22" xmlns="http://www.w3.org/2000/svg">
    <circle cx="11" cy="11" r="10" fill="#2563eb" stroke="white" stroke-width="2.5" opacity="0.9"/>
    <circle cx="11" cy="11" r="4" fill="white"/>
  </svg>`;
  const gpsIcon = L.divIcon({ html: gpsSvg, className: '', iconSize:[22,22], iconAnchor:[11,11] });

  if (!gpsMarker) {
    gpsMarker = L.marker([lat, lng], { icon: gpsIcon, zIndexOffset: 1000 }).addTo(map);
    gpsMarker.bindTooltip('Vous êtes ici', { permanent: false, direction: 'top', offset:[0,-12] });
    gpsCircle = L.circle([lat, lng], { radius: accuracy, color:'#2563eb', fillColor:'#3b82f6', fillOpacity: 0.08, weight: 1.5 }).addTo(map);
    showToast(`Position trouvée · précision ~${Math.round(accuracy)} m`);
  } else {
    gpsMarker.setLatLng([lat, lng]);
    gpsCircle.setLatLng([lat, lng]);
    gpsCircle.setRadius(accuracy);
  }

  if (gpsFollowing) {
    map.setView([lat, lng], Math.max(map.getZoom(), 16), { animate: true });
    gpsFollowing = false; // centrer une seule fois puis laisser libre
  }
}

function onGPSError(err) {
  stopGPS();
  const msgs = {
    1: 'Accès à la position refusé — autorisez la localisation dans les réglages Safari',
    2: 'Position indisponible — vérifiez votre connexion',
    3: 'Délai dépassé — réessayez dans une zone dégagée'
  };
  showToast(msgs[err.code] || 'Erreur GPS');
}

// ─── Toast ───────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3200);
}

// ─── Resize fix ──────────────────────────────────────────────
setTimeout(() => map.invalidateSize(), 200);
window.addEventListener('resize', () => map.invalidateSize());
